name: TBF Track

on:
  schedule:
    - cron: "0 6 * * *"   # 09:00 TR
    - cron: "0 7 * * *"   # 10:00 TR
    - cron: "0 8 * * *"   # 11:00 TR
    - cron: "0 9 * * *"   # 12:00 TR
    - cron: "0 10 * * *"  # 13:00 TR
    - cron: "0 11 * * *"  # 14:00 TR
    - cron: "0 12 * * *"  # 15:00 TR
    - cron: "0 13 * * *"  # 16:00 TR
    - cron: "0 14 * * *"  # 17:00 TR
    - cron: "0 15 * * *"  # 18:00 TR
    - cron: "0 16 * * *"  # 19:00 TR
    - cron: "0 17 * * *"  # 20:00 TR
    - cron: "0 18 * * *"  # 21:00 TR
    - cron: "0 19 * * *"  # 22:00 TR
    - cron: "0 20 * * *"  # 23:00 TR
    - cron: "59 20 * * *" # 23:59 TR

  workflow_dispatch: # Manuel trigger

jobs:
  check-duyurular:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Libs
        run: pip install requests beautifulsoup4

      - name: Load cache
        uses: actions/cache@v4
        with:
          path: seen_posts.json
          key: seen-posts-cache
          restore-keys: seen-posts-cache

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tbf_bot.py

      - name: Save announcements
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_posts.json
          key: seen-posts-cache-${{ github.run_id }}
